[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt", "pip install -e finance_agents/"]

[start]
cmd = "cd backend && PYTHONPATH=/opt/render/project/src/finance_agents/src:$PYTHONPATH uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"

[variables]
PYTHONPATH = "/opt/render/project/src/finance_agents/src"
