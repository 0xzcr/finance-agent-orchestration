services:
  - type: web
    name: finance-agent-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CEREBRAS_MODEL
        value: llama-4-scout-17b-16e-instruct
      - key: KITE_API_KEY
        sync: false
      - key: KITE_API_SECRET
        sync: false
      - key: KITE_ACCESS_TOKEN
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health
